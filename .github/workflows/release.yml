name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "charts/**"

jobs:
  build-release-image:
    name: Build and push release image
    runs-on: self-hosted-hoprnet-bigger
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup devenv cache
        uses: cachix/cachix-action@v15
        with:
          name: devenv

      - name: Install devenv
        run: nix profile install --accept-flake-config github:cachix/devenv/latest

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build release container
        run: devenv container build hose

      - name: Push release container
        run: devenv container --registry docker://ghcr.io/ copy hose
