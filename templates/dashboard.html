{% extends "base.html" %}

{% block title %}Dashboard - HOSE{% endblock %}

{% block content %}
<h1>Dashboard</h1>
<div class="stats">
    <div class="stat">
        <div class="value" data-counter="peers">{{ peer_count }}</div>
        <div class="label">Tracked Peers</div>
    </div>
    <div class="stat">
        <div class="value" data-counter="sessions">{{ session_count }}</div>
        <div class="label">Active Sessions</div>
    </div>
    <div class="stat">
        <div class="value" data-counter="debug-sessions">{{ debug_session_count }}</div>
        <div class="label">Debug Sessions</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/DashboardLive.mjs"></script>
{% endblock %}
