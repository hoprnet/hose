# Default values for hose.
replicaCount: 1
image:
  repository: hopr/hose
  # Defaults to the chart appVersion if left empty
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  # Whether to create a ServiceAccount
  create: true
  # Annotations to add to the ServiceAccount
  annotations: {}
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podLabels: {}
service:
  type: ClusterIP
  grpcType: LoadBalancer
ingress:
  enabled: false
  className: ""
  annotations: {}
  grpcHostname: "hose-ingestor.local"
  hosts:
    - host: hose.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: hose-tls
  #    hosts:
  #      - hose.local
persistence:
  enabled: true
  size: 1Gi
  # Leave empty to use the cluster default StorageClass
  storageClass: ""
  accessModes:
    - ReadWriteOnce
# Application configuration — mapped to environment variables via ConfigMap
config:
  grpcListen: "0.0.0.0:4317"
  httpListen: "0.0.0.0:8080"
  databasePath: "/data/hose.db"
  retentionHours: "24"
  writeBufferSize: "1000"
  writeBufferFlushSecs: "5"
  # Optional: HOPR indexer GraphQL endpoint
  indexerEndpoint: ""
  rustLog: "info"
# Additional environment variables (e.g. from Secrets)
extraEnv: []
# - name: MY_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: password

# Additional envFrom sources
extraEnvFrom: []
# - secretRef:
#     name: my-secret

podSecurityContext: {}
# fsGroup: 1000

securityContext: {}
# runAsNonRoot: true
# runAsUser: 1000
# readOnlyRootFilesystem: true

resources: {}
# requests:
#   cpu: 100m
#   memory: 128Mi
# limits:
#   cpu: 500m
#   memory: 512Mi

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
livenessProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
nodeSelector: {}
tolerations: []
affinity: {}
